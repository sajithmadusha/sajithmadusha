<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 50" width="100%" height="50">
  <style>
    @keyframes scroll {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    .marquee-box {
      width: 100%;
      overflow: hidden;
    }
    .marquee-content {
      display: flex;
      width: max-content;
      animation: scroll 25s linear infinite;
    }
    .icon-group {
      display: flex;
      gap: 15px;
      padding-right: 15px;
    }
    .icon-group img {
      width: 40px;
      height: 40px;
    }
  </style>
  <foreignObject width="800" height="50">
    <div xmlns="http://www.w3.org/1999/xhtml" class="marquee-box">
      <div class="marquee-content">
        <div class="icon-group">
          <img src="https://raw.githubusercontent.com/devicons/devicon/master/icons/bootstrap/bootstrap-plain.svg" />
          <img src="https://raw.githubusercontent.com/devicons/devicon/master/icons/c/c-original.svg" />
          <img src="https://raw.githubusercontent.com/devicons/devicon/master/icons/css3/css3-original.svg" />
          <img src="https://www.vectorlogo.zone/logos/dartlang/dartlang-icon.svg" />
          <img src="https://www.vectorlogo.zone/logos/figma/figma-icon.svg" />
          <img src="https://www.vectorlogo.zone/logos/flutterio/flutterio-icon.svg" />
          <img src="https://www.vectorlogo.zone/logos/git-scm/git-scm-icon.svg" />
          <img src="https://raw.githubusercontent.com/devicons/devicon/master/icons/html5/html5-original.svg" />
          <img src="https://raw.githubusercontent.com/devicons/devicon/master/icons/java/java-original.svg" />
          <img src="https://raw.githubusercontent.com/devicons/devicon/master/icons/javascript/javascript-original.svg" />
          <img src="https://raw.githubusercontent.com/devicons/devicon/master/icons/mysql/mysql-original-wordmark.svg" />
          <img src="https://raw.githubusercontent.com/devicons/devicon/master/icons/php/php-original.svg" />
          <img src="https://raw.githubusercontent.com/devicons/devicon/master/icons/python/python-original.svg" />
          <img src="https://raw.githubusercontent.com/devicons/devicon/master/icons/react/react-original-wordmark.svg" />
        </div>
        <div class="icon-group">
          <img src="https://raw.githubusercontent.com/devicons/devicon/master/icons/bootstrap/bootstrap-plain.svg" />
          <img src="https://raw.githubusercontent.com/devicons/devicon/master/icons/c/c-original.svg" />
          <img src="https://raw.githubusercontent.com/devicons/devicon/master/icons/css3/css3-original.svg" />
          <img src="https://www.vectorlogo.zone/logos/dartlang/dartlang-icon.svg" />
          <img src="https://www.vectorlogo.zone/logos/figma/figma-icon.svg" />
          <img src="https://www.vectorlogo.zone/logos/flutterio/flutterio-icon.svg" />
          <img src="https://www.vectorlogo.zone/logos/git-scm/git-scm-icon.svg" />
          <img src="https://raw.githubusercontent.com/devicons/devicon/master/icons/html5/html5-original.svg" />
          <img src="https://raw.githubusercontent.com/devicons/devicon/master/icons/java/java-original.svg" />
          <img src="https://raw.githubusercontent.com/devicons/devicon/master/icons/javascript/javascript-original.svg" />
          <img src="https://raw.githubusercontent.com/devicons/devicon/master/icons/mysql/mysql-original-wordmark.svg" />
          <img src="https://raw.githubusercontent.com/devicons/devicon/master/icons/php/php-original.svg" />
          <img src="https://raw.githubusercontent.com/devicons/devicon/master/icons/python/python-original.svg" />
          <img src="https://raw.githubusercontent.com/devicons/devicon/master/icons/react/react-original-wordmark.svg" />
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
